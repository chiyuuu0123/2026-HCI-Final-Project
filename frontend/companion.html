      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderInlineMarkdown(text) {
        return escapeHtml(text)
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/`([^`]+)`/g, "<code>$1</code>");
      }

      function renderPetMarkdown(markdown) {
        const source = String(markdown || "龙龙暂时没有想到合适的回答。").trim();
        const blocks = [];
        const lines = source.split(/\r?\n/);
        let list = [];
        let code = [];
        let codeLang = "";
        let inCode = false;

        const flushList = () => {
          if (!list.length) return;
          blocks.push(`<ul>${list.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`);
          list = [];
        };
        const flushCode = () => {
          if (!code.length && !codeLang) return;
          blocks.push(`<pre><span>${escapeHtml(codeLang || "code")}</span><code>${escapeHtml(code.join("\n"))}</code></pre>`);
          code = [];
          codeLang = "";
        };

        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith("```")) {
            if (inCode) {
              flushCode();
              inCode = false;
            } else {
              flushList();
              inCode = true;
              codeLang = trimmed.replace(/^```/, "").trim();
            }
            continue;
          }

          if (inCode) {
            code.push(line);
            continue;
          }

          if (!trimmed) {
            flushList();
            continue;
          }

          const heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            flushList();
            blocks.push(`<h3>${renderInlineMarkdown(heading[2])}</h3>`);
            continue;
          }

          const item = trimmed.match(/^[-*+]\s+(.+)$/);
          if (item) {
            list.push(item[1]);
            continue;
          }

          flushList();
          blocks.push(`<p>${renderInlineMarkdown(trimmed)}</p>`);
        }

        flushList();
        flushCode();
        return blocks.join("");
      }

      function withLonglongAnswerLine(content) {
        const text = String(content || "龙龙没有收到有效回答。").trim();
        if (text.startsWith(LONGLONG_ANSWER_LINE)) return text;
        return `${LONGLONG_ANSWER_LINE}\n\n${text}`;
      }

      function formatStudyDuration(totalSeconds) {
        const seconds = Math.max(0, Math.floor(Number(totalSeconds) || 0));
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const restSeconds = seconds % 60;

        return [hours, minutes, restSeconds].map((value) => String(value).padStart(2, "0")).join(":");
      }

      function applyStudyTimerSnapshot(snapshot = {}) {
        const formatted = snapshot.formatted || formatStudyDuration(snapshot.seconds);
        studyTime.textContent = formatted;
      }

      function showPetMotion(className = "speaking") {
        pet.classList.remove("speaking", "poked", "thinking");
        window.requestAnimationFrame(() => {
          pet.classList.add(className);
          window.setTimeout(() => pet.classList.remove(className), 640);
        });
      }

      function setPetSpriteState(state = "default") {
        const nextState = PET_ANIMATION_SPRITES[state] ? state : "default";
        const nextSource = PET_ANIMATION_SPRITES[nextState];
        currentPetSpriteState = nextState;
        if (petSprite && petSprite.getAttribute("src") !== nextSource) {
          petSprite.setAttribute("src", nextSource);
        }
        pet.dataset.spriteState = nextState;
        pet.classList.toggle("asset-motion", nextState !== "default");
      }

      function schedulePetSleep() {
        window.clearTimeout(petSleepTimer);
        if (companionMode !== "pet") return;
        petSleepTimer = window.setTimeout(() => {
          window.clearTimeout(restoreSpriteTimer);
          setPetSpriteState("sleep");
        }, PET_SLEEP_DELAY_MS);
      }

      function resetPetActivity() {
        window.clearTimeout(petSleepTimer);
        window.clearTimeout(nativeMoveSpriteTimer);
        if (currentPetSpriteState === "sleep") {
          setPetSpriteState("default");
        }
        schedulePetSleep();
      }

      function playPetSprite(state, duration = 1300) {
        window.clearTimeout(petSleepTimer);
        window.clearTimeout(restoreSpriteTimer);
        window.clearTimeout(nativeMoveSpriteTimer);
        setPetSpriteState(state);
        restoreSpriteTimer = window.setTimeout(() => {
          setPetSpriteState("default");
          schedulePetSleep();
        }, duration);
      }

      function getPetMoveSprite(deltaX, deltaY) {
        if (Math.abs(deltaX) > Math.abs(deltaY)) {
          return deltaX < 0 ? "move-left" : "move-right";
        }
        return "move-up";
      }

      function getStablePetMoveSprite(deltaX, deltaY, minimumDistance, dominanceRatio = 1) {
        const absX = Math.abs(deltaX);
        const absY = Math.abs(deltaY);
        if (Math.hypot(absX, absY) < minimumDistance) return "";
        if (absX >= absY * dominanceRatio) return deltaX < 0 ? "move-left" : "move-right";
        if (absY >= absX * dominanceRatio) return "move-up";
        return "";
      }

      function handleNativeDragMotion(motion = {}) {
        if (companionMode !== "pet" || petDragState || Date.now() < ignoreNativeDragMotionUntil) return;
        const deltaX = Number(motion.deltaX) || 0;
        const deltaY = Number(motion.deltaY) || 0;
        if (Math.abs(deltaX) + Math.abs(deltaY) < 1) return;

        window.clearTimeout(petSleepTimer);
        window.clearTimeout(restoreSpriteTimer);
        window.clearTimeout(nativeMoveSpriteTimer);
        setPetSpriteState(getPetMoveSprite(deltaX, deltaY));
        nativeMoveSpriteTimer = window.setTimeout(() => {
          setPetSpriteState("default");
          schedulePetSleep();
        }, 320);
      }

      function getPointerScreenPoint(event) {
        const screenX = Number(event.screenX);
        const screenY = Number(event.screenY);
        return {
          x: Number.isFinite(screenX) ? screenX : window.screenX + event.clientX,
          y: Number.isFinite(screenY) ? screenY : window.screenY + event.clientY,
        };
      }

      function flushPetDragMove() {
        petDragAnimationFrame = 0;
        if (!pendingPetDragBounds) return;
        ignoreNativeDragMotionUntil = Date.now() + 220;
        window.mindStudy?.moveCompanionTo?.(pendingPetDragBounds);
        pendingPetDragBounds = null;
      }

      function schedulePetDragMove(bounds) {
        pendingPetDragBounds = bounds;
        if (petDragAnimationFrame) return;
        petDragAnimationFrame = window.requestAnimationFrame(flushPetDragMove);
      }

      function applyPetDragSprite(spriteState) {
        if (!petDragState || !spriteState || spriteState === petDragState.spriteState) return;
        petDragState.spriteState = spriteState;
        petDragState.lastSpriteChangeAt = Date.now();
        petDragState.directionAnchorX = petDragState.lastX;
        petDragState.directionAnchorY = petDragState.lastY;
        setPetSpriteState(spriteState);
      }

      function updatePetDragSprite() {
        if (companionMode !== "pet") return;
        window.clearTimeout(petSleepTimer);
        window.clearTimeout(restoreSpriteTimer);
        window.clearTimeout(nativeMoveSpriteTimer);
        if (!petDragState) return;

        if (petDragState.spriteState === "default") {
          applyPetDragSprite(getStablePetMoveSprite(
            petDragState.lastX - petDragState.startX,
            petDragState.lastY - petDragState.startY,
            PET_DRAG_DIRECTION_START_DISTANCE,
            1,
          ));
          return;
        }

        const now = Date.now();
        if (now - petDragState.lastSpriteChangeAt < PET_DRAG_DIRECTION_SWITCH_MS) return;
        const nextSpriteState = getStablePetMoveSprite(
          petDragState.lastX - petDragState.directionAnchorX,
          petDragState.lastY - petDragState.directionAnchorY,
          PET_DRAG_DIRECTION_SWITCH_DISTANCE,
          PET_DRAG_DIRECTION_RATIO,
        );
        applyPetDragSprite(nextSpriteState);
      }

      function startPetDrag(event) {
        if (event.button !== 0 || (companionMode === "chat" && event.target.closest("[data-pet-action]"))) return;
        if (event.target.closest("button, input, textarea, select, a") && !event.currentTarget.classList.contains("pet-body")) return;

        const point = getPointerScreenPoint(event);
        petDragState = {
          pointerId: event.pointerId,
          startX: point.x,
          startY: point.y,
          lastX: point.x,
          lastY: point.y,
          startBounds: {
            x: Math.round(window.screenX),
            y: Math.round(window.screenY),
          },
          handle: event.currentTarget,
          spriteState: "default",
          lastSpriteChangeAt: 0,
          directionAnchorX: point.x,
          directionAnchorY: point.y,
        };
        event.preventDefault();
        try {
          event.currentTarget.setPointerCapture?.(event.pointerId);
        } catch {}
        pet.classList.add("dragging");
        window.clearTimeout(petSleepTimer);
        if (currentPetSpriteState === "sleep") setPetSpriteState("default");
      }

      function movePetDrag(event) {
        if (!petDragState || event.pointerId !== petDragState.pointerId) return;
        const point = getPointerScreenPoint(event);
        const dragDeltaX = point.x - petDragState.startX;
        const dragDeltaY = point.y - petDragState.startY;
        petDragState.lastX = point.x;
        petDragState.lastY = point.y;

        event.preventDefault();
        schedulePetDragMove({
          x: Math.round(petDragState.startBounds.x + dragDeltaX),
          y: Math.round(petDragState.startBounds.y + dragDeltaY),
        });
        updatePetDragSprite();
      }

      function stopPetDrag(event) {
        if (!petDragState || event.pointerId !== petDragState.pointerId) return;
        if (petDragAnimationFrame) {
          window.cancelAnimationFrame(petDragAnimationFrame);
          flushPetDragMove();
        }
        try {
          petDragState.handle?.releasePointerCapture?.(event.pointerId);
        } catch {}
        ignoreNativeDragMotionUntil = Date.now() + 500;
        petDragState = null;
        pet.classList.remove("dragging");
        nativeMoveSpriteTimer = window.setTimeout(() => {
          setPetSpriteState("default");
          schedulePetSleep();
        }, 320);
      }

      function setTip(text, { temporary = false, motion = "speaking" } = {}) {
        tip.textContent = text || latestSnapshot?.reminder || "点我和龙龙聊天";
        showPetMotion(motion);

        window.clearTimeout(restoreTipTimer);
        if (temporary) {
          restoreTipTimer = window.setTimeout(() => {
            tip.textContent = latestSnapshot?.reminder || latestSnapshot?.mood || "今天也一起学一会儿吧";
          }, 4200);
        }
      }

      function setPetActionsVisible(visible) {
        window.clearTimeout(petActionsHideTimer);
        pet.classList.toggle("actions-visible", Boolean(visible));
      }

      function schedulePetActionsHide(delay = 120) {
        window.clearTimeout(petActionsHideTimer);
        petActionsHideTimer = window.setTimeout(() => {
          setPetActionsVisible(false);
        }, delay);
      }

      function hidePetActions() {
        setPetActionsVisible(false);
        const activeElement = document.activeElement;
        if (activeElement?.closest?.(".pet-actions")) {
          activeElement.blur();
        }
      }

      function initPetActionHover() {
        [bubble, petBody, actions].filter(Boolean).forEach((target) => {
          target.addEventListener("pointerenter", () => setPetActionsVisible(true));
          target.addEventListener("pointerleave", () => schedulePetActionsHide());
        });
      }

      function pickRandom(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function loadVoiceState() {
        try {
          const stored = JSON.parse(localStorage.getItem(VOICE_STORAGE_KEY) || "{}");
          return {
            enabled: stored.enabled !== false,
            voiceName: stored.voiceName || "",
            provider: LONGLONG_CLONE_PROVIDER,
          };
        } catch {
          return {
            enabled: true,
            voiceName: "",
            provider: LONGLONG_CLONE_PROVIDER,
          };
        }
      }

      function saveVoiceState() {
        try {
          localStorage.setItem(VOICE_STORAGE_KEY, JSON.stringify(voiceState));
        } catch {
          // 语音偏好保存失败不影响龙龙继续说话。
        }
      }

      function syncVoiceControls() {
        if (voiceToggle) voiceToggle.checked = voiceState.enabled;
        if (voiceAction) voiceAction.textContent = voiceState.enabled ? "静音" : "语音";
        const cloneTip = "龙龙现在只播放内置问候和提醒音频，不会实时生成语音。";
        if (voiceAction) voiceAction.title = cloneTip;
        if (voiceToggle) voiceToggle.title = cloneTip;
        pet.classList.toggle("voice-enabled", voiceState.enabled);
      }

      function renderPetIcons() {
        window.lucide?.createIcons();
      }

      function stripSpeechText(text) {
        return String(text || "")
          .replace(/```[\s\S]*?```/g, "这段代码龙龙已经放在文字里了。")
          .replace(/`([^`]+)`/g, "$1")
          .replace(/!\[[^\]]*\]\([^)]*\)/g, "")
          .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1")
          .replace(/^#{1,6}\s+/gm, "")
          .replace(/^[-*+]\s+/gm, "")
          .replace(/\*\*|__|~~/g, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function stopLonglongVoice() {
        voiceRequestId += 1;
        if (currentVoiceAudio) {
          currentVoiceAudio.pause();
          currentVoiceAudio.src = "";
          currentVoiceAudio = null;
        }
        pet.classList.remove("voice-speaking");
      }

      function playLonglongAudio(sourceUrl, requestId) {
        if (!sourceUrl || requestId !== voiceRequestId) return false;
        if (currentVoiceAudio) currentVoiceAudio.pause();
        currentVoiceAudio = new Audio(sourceUrl);
        currentVoiceAudio.volume = longlongVoicePack.profile.volume;
        pet.classList.add("voice-speaking");
        currentVoiceAudio.onended = () => {
          if (requestId === voiceRequestId) pet.classList.remove("voice-speaking");
        };
        currentVoiceAudio.onerror = () => {
          if (requestId === voiceRequestId) pet.classList.remove("voice-speaking");
        };
        currentVoiceAudio.play().catch(() => {
          if (requestId === voiceRequestId) pet.classList.remove("voice-speaking");
        });
        return true;
      }

      function speakLonglong(text, options = {}) {
        if (!voiceState.enabled) return;
        const content = stripSpeechText(text).slice(0, options.maxLength || 180);
        if (!content) return;

        stopLonglongVoice();
        const requestId = voiceRequestId;
        const audioSource = options.audio || hardcodedLonglongAudio.get(content);
        if (audioSource) playLonglongAudio(audioSource, requestId);
      }

      function toggleVoice(enabled = !voiceState.enabled) {
        voiceState.enabled = Boolean(enabled);
        saveVoiceState();
        syncVoiceControls();
        if (voiceState.enabled) {
          speakLonglong(pickRandom(longlongVoicePack.boot), { maxLength: 80 });
        } else {
          stopLonglongVoice();
        }
      }

      function applyMode(mode) {
        companionMode = mode === "chat" ? "chat" : "pet";
        pet.classList.toggle("chat-mode", companionMode === "chat");
        pet.classList.toggle("pet-mode", companionMode === "pet");
        if (companionMode === "chat") {
          window.clearTimeout(petSleepTimer);
          window.clearTimeout(restoreSpriteTimer);
          window.clearTimeout(nativeMoveSpriteTimer);
          setPetSpriteState("default");
        } else {
          schedulePetSleep();
        }
      }

      async function setMode(mode) {
        applyMode(mode);
        await window.mindStudy?.setCompanionMode?.(companionMode);

        if (companionMode === "chat") {
          window.setTimeout(() => chatInput?.focus(), 80);
        }
      }

      function addChatMessage(role, content, options = {}) {
        const message = document.createElement("article");
        message.className = `pet-chat-message ${role}`;
        message.innerHTML = `
          ${role === "assistant" ? '<img src="./assets/longlong-guide.gif" alt="" draggable="false" />' : ""}
          <div>
            ${renderPetMarkdown(content)}
            ${options.meta ? `<small>${escapeHtml(options.meta)}</small>` : ""}
          </div>
        `;
        chatList.append(message);
        chatList.scrollTop = chatList.scrollHeight;
        return message;
      }

      function updateChatMessage(message, content, options = {}) {
        if (!message) return;
        message.querySelector("div").innerHTML = `
          ${renderPetMarkdown(content)}
          ${options.meta ? `<small>${escapeHtml(options.meta)}</small>` : ""}
        `;
        chatList.scrollTop = chatList.scrollHeight;
      }

      async function submitChat(event) {
        event.preventDefault();
        const text = chatInput.value.trim();
        if (!text) {
          chatInput.focus();
          return;
        }

        chatInput.value = "";
        addChatMessage("user", text);
        chatHistory.push({ role: "user", content: text });
        window.mindStudy?.addLonglongAffection?.({ amount: 2, reason: "chat" }).catch(() => {});
        const thinking = addChatMessage("assistant", LONGLONG_THINKING_LINE);
        setTip(LONGLONG_THINKING_LINE, { temporary: true, motion: "thinking" });
        speakLonglong(LONGLONG_THINKING_LINE, { maxLength: 80 });

        try {
          const response = await window.mindStudy?.askLonglongCompanion?.({
            message: text,
            includeScreen: screenToggle.checked,
            history: chatHistory.slice(0, -1),
            options: {
              maxTokens: 1200,
              temperature: 0.28,
            },
          });
          const rawAnswer = response?.answer || "龙龙没有收到有效回答。";
          const answer = withLonglongAnswerLine(rawAnswer);
          const screenMeta = response?.screen?.captured
            ? response.screen.textExtracted
              ? `已读取屏幕文字${response.screen.textLength ? ` · ${response.screen.textLength} 字` : ""}`
              : "已截图，但没有识别到可靠文字"
            : screenToggle.checked
              ? "未能读取屏幕文字"
              : "";
          updateChatMessage(thinking, answer, { meta: screenMeta });
          speakLonglong(LONGLONG_ANSWER_LINE, { maxLength: 80 });
          chatHistory.push({ role: "assistant", content: rawAnswer });
          chatHistory = chatHistory.slice(-10);
        } catch (error) {
          const errorText = `龙龙这次没连上：${error.message || String(error)}`;
          updateChatMessage(thinking, errorText);
        }
      }

      function handlePetAction(action) {
        if (action === "chat") {
          resetPetActivity();
          setMode("chat");
          return;
        }

        if (action === "pet") {
          resetPetActivity();
          setMode("pet");
          return;
        }

        if (action === "wake") {
          resetPetActivity();
          window.mindStudy?.wakeMainWindow?.();
          return;
        }

        if (action === "voice") {
          resetPetActivity();
          toggleVoice();
          return;
        }

        if (action === "poke") {
          const text = pickRandom(longlongVoicePack.poke);
          playPetSprite("touch", 1500);
          setTip(text, { temporary: true, motion: "poked" });
          speakLonglong(text, { maxLength: 80 });
          return;
        }

        if (action === "tip") {
          const text = pickRandom(longlongVoicePack.tip);
          resetPetActivity();
          setTip(text, { temporary: true, motion: "thinking" });
          speakLonglong(text, { maxLength: 90 });
          return;
        }

        if (action === "quote") {
          const text = pickRandom(longlongVoicePack.quote);
          resetPetActivity();
          setTip(text, { temporary: true, motion: "thinking" });
          speakLonglong(text, { maxLength: 90 });
          return;
        }

        if (action === "gift") {
          resetPetActivity();
          window.mindStudy?.wakeMainWindow?.();
          setTip("送礼在主窗口龙龙下面，龙龙等你来。", { temporary: true, motion: "speaking" });
          return;
        }

        if (action === "sleep") {
          window.clearTimeout(petSleepTimer);
          window.clearTimeout(restoreSpriteTimer);
          window.clearTimeout(nativeMoveSpriteTimer);
          stopLonglongVoice();
          setPetSpriteState("sleep");
          setTip("龙龙先睡一小会儿。", { temporary: false, motion: "thinking" });
          return;
        }
      }

      window.mindStudy?.onCompanionSnapshot?.((snapshot) => {
        if (!snapshot) return;
        latestSnapshot = snapshot;
        if (snapshot.studyTime) applyStudyTimerSnapshot({ formatted: snapshot.studyTime });
        setTip(snapshot.reminder || snapshot.mood || "点我和龙龙聊天");
      });
      window.mindStudy?.onCompanionMode?.((mode) => applyMode(mode));
      window.mindStudy?.onCompanionDragMotion?.(handleNativeDragMotion);

      const studyTimerPromise = window.mindStudy?.getStudyTimer?.();
      studyTimerPromise?.then(applyStudyTimerSnapshot).catch(() => {});
      window.mindStudy?.onStudyTimerUpdate?.(applyStudyTimerSnapshot);
      syncVoiceControls();
      initPetActionHover();
      if (document.readyState === "loading") {
        window.addEventListener("DOMContentLoaded", renderPetIcons, { once: true });
      } else {
        renderPetIcons();
      }
      schedulePetSleep();

      bubble.addEventListener("click", () => {
        resetPetActivity();
        window.mindStudy?.wakeMainWindow?.();
      });

      voiceToggle.addEventListener("change", () => {
        resetPetActivity();
        toggleVoice(voiceToggle.checked);
      });

      actions.addEventListener("click", (event) => {
        const actionButton = event.target.closest("[data-pet-action]");
        if (!actionButton) return;
        hidePetActions();
        handlePetAction(actionButton.dataset.petAction);
      });

      document.querySelectorAll("[data-pet-drag]").forEach((handle) => {
        handle.addEventListener("pointerdown", startPetDrag);
      });
      document.addEventListener("pointermove", movePetDrag);
      document.addEventListener("pointerup", stopPetDrag);
      document.addEventListener("pointercancel", stopPetDrag);

      document.addEventListener("click", (event) => {
        const actionButton = event.target.closest("[data-pet-action]");
        if (!actionButton || actions.contains(actionButton)) return;
        handlePetAction(actionButton.dataset.petAction);
      });
      chatForm.addEventListener("submit", submitChat);

      window.setInterval(() => {
        if (document.hidden || companionMode === "chat") return;
        setTip(latestSnapshot?.reminder || pickRandom(idleTips), { temporary: true, motion: "thinking" });
      }, 45000);
    </script>
  </body>
</html>
